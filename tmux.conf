# 256 color support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"

# Mouse
set -g mouse on

# Move between windows
bind -n M-H previous-window
bind -n M-G next-window

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# set vi-mode
set-window-option -g mode-keys vi

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Clear screen
bind C-k send-keys -R \; send-keys C-l \; clear-history

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# URLs
bind u display-popup -E -w 80% -h 60% "~/.config/tmux/scripts/url-picker.sh"

# Session picker sorted alphabetically
bind s choose-tree -sZ -O name

# Fzf session picker (named first, numbered last)
bind S display-popup -E -w 90% -h 85% \
  "tmux list-sessions -F '#S' | awk '/^[^0-9]/{print} /^[0-9]/{buf=buf\"\\n\"\$0} END{if(buf)print substr(buf,2)}' | fzf --reverse --preview 'tmux capture-pane -e -p -t {}' --preview-window=up:70%:wrap | xargs tmux switch-client -t"

# Fzf start tmuxinator project
bind T display-popup -E -w 60% -h 50% \
  "tmuxinator list -n | tail -n +2 | tr ' ' '\n' | sed '/^$/d' | fzf --reverse --prompt='start> ' | xargs tmuxinator start"

# Fzf kill tmux session
bind X display-popup -E -w 60% -h 50% \
  "tmux list-sessions -F '#S' | fzf --reverse --prompt='kill> ' | xargs tmux kill-session -t"

# File picker
bind C-f display-popup -E "~/.config/tmux/scripts/tmux-file-picker.sh"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Omarchy Tmux integration
source-file ~/.config/omarchy/current/theme/tmux.conf
# End Omarchy Tmux integration

run '~/.config/tmux/plugins/tpm/tpm'
